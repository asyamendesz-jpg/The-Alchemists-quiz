<!-- ================================
     КВИЗ: "Какой вы логист Шёлкового пути?"
     WordPress-вставка: просто вставьте этот блок целиком
================================ -->
<div class="sp-quiz" id="spQuiz">
  <!-- ПРОГРЕСС -->
  <div class="sp-quiz__progressWrap">
    <div class="sp-quiz__progress">
      <div class="sp-quiz__progressBar" id="spProgressBar"></div>
    </div>
    <div class="sp-quiz__progressText" id="spProgressText"></div>
  </div>
  <!-- ЭКРАН ВОПРОСОВ -->
  <div class="sp-quiz__screen" id="spScreenQuiz">
    <h2 class="sp-quiz__title">Какой вы логист Шёлкового пути?</h2>
    <p class="sp-quiz__subtitle">
      Ответьте на 5 вопросов и узнайте, кем бы вы стали на древнем торговом пути:
      осторожным хранителем каравана, рискованным авантюристом или мастером караванной логистики.
    </p>
    <div class="sp-quiz__question" id="spQuestion"></div>
    <div class="sp-quiz__answers" id="spAnswers"></div>
  </div>
  <!-- ЭКРАН РЕЗУЛЬТАТА -->
  <div class="sp-quiz__screen sp-quiz__result" id="spScreenResult" style="display:none;">
    <h3 class="sp-quiz__resultTitle" id="spResultTitle"></h3>
    <p class="sp-quiz__resultText" id="spResultText"></p>
    <button class="sp-quiz__restart" type="button" id="spRestartBtn">
      Пройти ещё раз
    </button>
    <p class="sp-quiz__note">
      Квиз развлекательный, но хорошо отражает ваш стиль мышления в логистике.
    </p>
  </div>
</div>
<style>
/* =========================================
   СТИЛИ КВИЗА (изолированы префиксом sp-quiz)
   Не должны ломать тему WordPress и наоборот
========================================= */
.sp-quiz{
  --sp-bg1:#1b1b1b;
  --sp-bg2:#3a2a1a;
  --sp-card:#222;
  --sp-card2:#333;
  --sp-accent:#f5c26b;
  --sp-text:#ffffff;
  --sp-muted:#dddddd;
  --sp-muted2:#bbbbbb;
  color: var(--sp-text);
  max-width: 820px;
  margin: 0 auto;
  padding: 22px;
  border-radius: 18px;
  background: linear-gradient(135deg, var(--sp-bg1), var(--sp-bg2));
  box-shadow: 0 0 40px rgba(0,0,0,0.35);
  font-family: Arial, sans-serif;
}
.sp-quiz *{ box-sizing:border-box; }
.sp-quiz__progressWrap{
  margin-bottom: 18px;
}
.sp-quiz__progress{
  height: 10px;
  width: 100%;
  background: rgba(255,255,255,0.15);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 8px;
}
.sp-quiz__progressBar{
  height: 100%;
  width: 0%;
  background: var(--sp-accent);
  transition: width 0.35s ease;
}
.sp-quiz__progressText{
  text-align: right;
  color: var(--sp-muted2);
  font-size: 14px;
}
.sp-quiz__screen{
  background: rgba(0,0,0,0.22);
  border-radius: 14px;
  padding: 18px;
}
.sp-quiz__title{
  margin: 0 0 10px;
  text-align: center;
  color: var(--sp-accent);
  font-size: 26px;
  line-height: 1.2;
}
.sp-quiz__subtitle{
  margin: 0 0 18px;
  text-align: center;
  color: var(--sp-muted);
  font-size: 15px;
  line-height: 1.55;
}
.sp-quiz__question{
  font-size: 20px;
  line-height: 1.35;
  margin: 6px 0 16px;
}
.sp-quiz__answers{
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.sp-quiz__btn{
  width: 100%;
  border: 0;
  border-radius: 12px;
  padding: 14px 14px;
  background: var(--sp-card2);
  color: var(--sp-text);
  cursor: pointer;
  font-size: 16px;
  text-align: left;
  transition: transform 0.18s ease, background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
}
.sp-quiz__btn:hover{
  background: var(--sp-accent);
  color: #000;
  transform: translateY(-2px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.35);
}
.sp-quiz__btn:disabled{
  opacity: 0.7;
  cursor: default;
  transform: none;
  box-shadow: none;
}
.sp-quiz__resultTitle{
  margin: 0 0 12px;
  color: var(--sp-accent);
  font-size: 22px;
  text-align: center;
}
.sp-quiz__resultText{
  margin: 0 0 16px;
  color: var(--sp-muted);
  font-size: 16px;
  line-height: 1.65;
  text-align: center;
}
.sp-quiz__restart{
  display: block;
  margin: 0 auto;
  border: 0;
  border-radius: 12px;
  padding: 12px 18px;
  background: var(--sp-accent);
  color: #000;
  cursor: pointer;
  font-size: 16px;
  transition: transform 0.18s ease, box-shadow 0.25s ease;
}
.sp-quiz__restart:hover{
  transform: scale(1.04);
  box-shadow: 0 8px 18px rgba(0,0,0,0.35);
}
.sp-quiz__note{
  margin: 12px 0 0;
  text-align: center;
  color: rgba(255,255,255,0.65);
  font-size: 13px;
  line-height: 1.5;
}
@media (max-width: 768px){
  .sp-quiz{ padding: 16px; }
  .sp-quiz__title{ font-size: 22px; }
  .sp-quiz__question{ font-size: 18px; }
  .sp-quiz__btn{ font-size: 15px; padding: 13px; }
}
</style>
<script>
/* =========================================
   JS КВИЗА
   Важно: обёрнут в IIFE, чтобы не засорять глобальную область WordPress
========================================= */
(function(){
  // Если на странице несколько вставок квиза — эта версия рассчитана на один экземпляр.
  // При необходимости сделаю мульти-инстанс (несколько квизов на странице).
  const root = document.getElementById("spQuiz");
  if(!root) return;
  const questions = [
    {
      question: "Вы собираете караван в Самарканде. Что возьмёте первым?",
      answers: [
        { text: "Редкие, дорогие товары с огромной наценкой", type: "risk" },
        { text: "Надёжный ходовой товар с понятным спросом", type: "smart" },
        { text: "Самое дешёвое, чтобы точно не прогореть", type: "safe" }
      ]
    },
    {
      question: "В Бухаре вам резко сбивают цену. Как реагируете?",
      answers: [
        { text: "Иду ва-банк и беру ещё дороже — отыграюсь дальше", type: "risk" },
        { text: "Спокойно считаю маржу и ищу выгодный компромисс", type: "smart" },
        { text: "Быстро соглашаюсь — лишь бы не потерять сделку", type: "safe" }
      ]
    },
    {
      question: "Как вы в целом относитесь к риску в делах?",
      answers: [
        { text: "Без серьёзного риска не бывает серьёзной прибыли", type: "risk" },
        { text: "Риск — только если выгода заранее просчитана", type: "smart" },
        { text: "Стараюсь избегать любых рискованных ситуаций", type: "safe" }
      ]
    },
    {
      question: "Что для вас важнее всего в торговле?",
      answers: [
        { text: "Сделать один, но очень большой выигрыш", type: "risk" },
        { text: "Стабильная прибыль и предсказуемые результаты", type: "smart" },
        { text: "Главное — не уйти в минус и ничего не потерять", type: "safe" }
      ]
    },
    {
      question: "Ваш главный принцип в дороге по Шёлковому пути?",
      answers: [
        { text: "Кто не рискует — тот не зарабатывает легендарные богатства", type: "risk" },
        { text: "Лучше меньше, но надёжно: караван важнее лишней выгоды", type: "smart" },
        { text: "Главное — доехать живыми и целыми, остальное потом", type: "safe" }
      ]
    }
  ];
  let currentQuestion = 0;
  let isLocked = false;
  let scores = { risk:0, smart:0, safe:0 };
  const screenQuiz = document.getElementById("spScreenQuiz");
  const screenResult = document.getElementById("spScreenResult");
  const questionEl = document.getElementById("spQuestion");
  const answersEl = document.getElementById("spAnswers");
  const progressBar = document.getElementById("spProgressBar");
  const progressText = document.getElementById("spProgressText");
  const resultTitleEl = document.getElementById("spResultTitle");
  const resultTextEl = document.getElementById("spResultText");
  const restartBtn = document.getElementById("spRestartBtn");
  function updateProgress(){
    const total = questions.length;
    const percent = (currentQuestion / total) * 100;
    progressBar.style.width = percent + "%";
    const step = Math.min(currentQuestion + 1, total);
    progressText.textContent = "Вопрос " + step + " из " + total;
  }
  function showQuestion(){
    const q = questions[currentQuestion];
    questionEl.textContent = q.question;
    answersEl.innerHTML = "";
    isLocked = false;
    q.answers.forEach((answer) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "sp-quiz__btn";
      btn.textContent = answer.text;
      btn.addEventListener("click", function(){
        selectAnswer(answer.type, btn);
      });
      answersEl.appendChild(btn);
    });
    updateProgress();
  }
  function selectAnswer(type, clickedBtn){
    if(isLocked) return;
    isLocked = true;
    // Быстрая визуальная фиксация выбора
    clickedBtn.disabled = true;
    scores[type]++;
    setTimeout(() => {
      currentQuestion++;
      if(currentQuestion < questions.length){
        showQuestion();
      } else {
        showResult();
      }
    }, 220);
  }
  function showResult(){
    screenQuiz.style.display = "none";
    screenResult.style.display = "block";
    progressBar.style.width = "100%";
    progressText.textContent = "Квиз пройден";
    let title = "";
    let text = "";
    if(scores.smart >= scores.risk && scores.smart >= scores.safe){
      title = "Вы — Мастер караванной логистики";
      text =
        "Вы мыслите как стратег Шёлкового пути: просчитываете риски, держите баланс и умеете управлять маршрутом. " +
        "Ваш стиль — надёжная система, где прибыль появляется не случайно, а по расчёту.";
    } else if(scores.risk >= scores.safe){
      title = "Вы — Авантюрист Великого пути";
      text =
        "Вы играете смело: готовы ставить на редкие товары и нестандартные решения. " +
        "Такой подход приносит громкие победы, но важно помнить: удача любит подготовленных.";
    } else {
      title = "Вы — Осторожный хранитель каравана";
      text =
        "Вы выбираете безопасность и устойчивость. " +
        "С вами караван редко попадает в неприятности, а решения всегда здравые и практичные. " +
        "Иногда вы можете упустить сверхприбыль, зато почти никогда не теряете базу.";
    }
    resultTitleEl.textContent = title;
    resultTextEl.textContent = text;
  }
  function restartQuiz(){
    currentQuestion = 0;
    isLocked = false;
    scores = { risk:0, smart:0, safe:0 };
    screenResult.style.display = "none";
    screenQuiz.style.display = "block";
    showQuestion();
  }
  restartBtn.addEventListener("click", restartQuiz);
  // Старт
  showQuestion();
})();
</script>
